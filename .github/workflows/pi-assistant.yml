name: Pi Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pi-response:
    # Only trigger when the comment mentions @pi
    if: contains(github.event.comment.body, '@pi')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run pi-action
        uses: mcowger/pi-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: openrouter
          model: ${{ vars.PLEXUS_MODEL }}
          pi_auth_json: ${{ secrets.PI_AUTH_JSON }}
          pi_models_json: ${{ secrets.PI_MODELS_JSON }}
          share_session: false
